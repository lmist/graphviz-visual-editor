name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: railway-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy webapp
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: >
          railway up
          --project 577cfd28-1ed7-4f4e-a835-b3475428b985
          --environment production
          --service webapp
          --ci
          --message "Deploy ${{ github.sha }}"
